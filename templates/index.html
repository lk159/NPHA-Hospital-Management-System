<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
      }

      body {
        background:
          linear-gradient(rgba(4, 12, 25, 0.4), rgba(11, 25, 47, 0.42)),
          url("/static/images/background.png") center/cover no-repeat;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .landing-container {
        text-align: center;
        color: #ffffff;
        max-width: 640px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(10, 24, 44, 0.62);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(10px);
        animation: fadeIn 0.8s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 12px;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.4);
      }

      p {
        font-size: 1.2rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.96);
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.32);
        margin-bottom: 30px;
      }

      .features {
        background: rgba(5, 14, 34, 0.8);
        backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 30px;
        margin: 30px 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .feature-item {
        display: inline-block;
        margin: 10px 15px;
      }

      .feature-item i {
        font-size: 1.5rem;
        margin-right: 8px;
      }

      .btn-login {
        background: white;
        color: var(--secondary-color);
        padding: 12px 40px;
        border-radius: 8px;
        border: none;
        font-weight: 600;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
        margin: 10px;
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        color: var(--secondary-color);
      }

      .btn-demo {
        background: transparent;
        color: white;
        border: 2px solid white;
        padding: 10px 35px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
        margin: 10px;
      }

      .btn-demo:hover {
        background: white;
        color: var(--secondary-color);
      }
    </style>
  </head>
  <body>
    <div class="landing-container">
      <h1>Hospital Management System</h1>
      <p>Complete patient care, billing, and operational management solution</p>

      <div class="features">
        <div class="feature-item">
          <i class="fas fa-users"></i>
          <span>Patient Management</span>
        </div>
        <div class="feature-item">
          <i class="fas fa-bed"></i>
          <span>Ward Management</span>
        </div>
        <div class="feature-item">
          <i class="fas fa-pills"></i>
          <span>Pharmacy</span>
        </div>
        <div class="feature-item">
          <i class="fas fa-flask"></i>
          <span>Laboratory</span>
        </div>
        <div class="feature-item">
          <i class="fas fa-receipt"></i>
          <span>Billing</span>
        </div>
        <div class="feature-item">
          <i class="fas fa-lock"></i>
          <span>Secure Access</span>
        </div>
      </div>

      <div>
        <a href="/login/" class="btn-login">
          <i class="fas fa-sign-in-alt"></i> Login
        </a>
        <a href="/dashboard/" class="btn-demo">
          <i class="fas fa-eye"></i> Demo
        </a>
      </div>

      <p style="margin-top: 40px; font-size: 0.9rem; opacity: 0.8">
        &copy; 2026 Popondetta General - Hospital Management System. All rights
        reserved.
      </p>
    </div>
  </body>
</html>
