<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Hospital Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
      }

      body {
        background:
          linear-gradient(rgba(4, 12, 25, 0.4), rgba(11, 25, 47, 0.42)),
          url("/static/images/background.png") center/cover no-repeat;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .login-container {
        width: 100%;
        max-width: 420px;
      }

      .login-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .login-header {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--secondary-color) 100%
        );
        color: white;
        padding: 40px 20px;
        text-align: center;
      }

      .login-header h1 {
        font-size: 2rem;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .login-header i {
        font-size: 2.5rem;
      }

      .login-header p {
        margin: 10px 0 0 0;
        opacity: 0.9;
        font-size: 0.95rem;
      }

      .login-body {
        padding: 40px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 8px;
        display: block;
      }

      .form-group input {
        border: 2px solid #ecf0f1;
        border-radius: 8px;
        padding: 12px 15px;
        font-size: 1rem;
        transition: all 0.3s;
      }

      .form-group input:focus {
        border-color: var(--secondary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        outline: none;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--secondary-color) 100%
        );
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
      }

      .login-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .alert {
        border-radius: 8px;
        border: none;
        margin-bottom: 20px;
      }

      .demo-credentials {
        background: #f0f8ff;
        border-left: 4px solid var(--secondary-color);
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 0.9rem;
      }

      .demo-credentials h6 {
        color: var(--primary-color);
        margin-bottom: 10px;
        font-weight: 600;
      }

      .demo-credentials p {
        margin: 5px 0;
        color: #555;
      }

      .demo-credentials code {
        background: white;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: "Courier New", monospace;
        font-size: 0.85rem;
      }

      .loader {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.8s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn-loading {
        display: inline-flex;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>
            <i class="fas fa-hospital"></i>
            HMS
          </h1>
          <p>Hospital Management System</p>
        </div>

        <div class="login-body">
          <form id="loginForm">
            <div id="alertContainer"></div>

            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                name="username"
                class="form-control"
                placeholder="Enter your username"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>

            <button type="submit" class="login-btn">
              <span class="btn-loading">
                <div class="loader"></div>
                <span class="btn-text">Sign In</span>
              </span>
            </button>
          </form>

          <div class="demo-credentials">
            <h6><i class="fas fa-info-circle"></i> Demo Credentials</h6>
            <p>
              <strong>Admin:</strong> <code>admin</code> / <code>admin123</code>
            </p>
            <p>
              <strong>Doctor:</strong> <code>doctor1</code> /
              <code>doc123</code>
            </p>
            <p>
              <strong>Nurse:</strong> <code>nurse1</code> /
              <code>nurse123</code>
            </p>
            <p><strong>HEO:</strong> <code>heo1</code> / <code>heo123</code></p>
            <p><strong>MRC:</strong> <code>mrc1</code> / <code>mrc123</code></p>
            <p>
              <strong>Pharmacist:</strong> <code>pharmacist1</code> /
              <code>pharm123</code>
            </p>
            <p>
              <strong>Lab Tech:</strong> <code>lab1</code> / <code>lab123</code>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const loader = document.querySelector(".loader");
          const btnText = document.querySelector(".btn-text");
          const submitBtn = document.querySelector(".login-btn");

          loader.style.display = "inline-block";
          submitBtn.disabled = true;
          btnText.textContent = "Signing in...";

          try {
            const response = await fetch("/api/login/", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ username, password }),
            });

            const data = await response.json();

            if (response.ok) {
              localStorage.setItem("token", data.token);
              localStorage.setItem("user_id", data.user_id);
              localStorage.setItem("username", data.username);
              localStorage.setItem("role", data.role);

              // Role-based redirect
              const role = (data.role || "").toLowerCase();
              const token = data.token || "";
              if (!token) {
                showAlert(
                  "error",
                  "Login succeeded but no access token was returned.",
                );
                return;
              }

              let destination = "/dashboard/";
              if (role === "pharmacy") {
                destination = "/pharmacy/";
              } else if (role === "lab") {
                destination = "/lab/";
              }

              window.location.href =
                destination + "?token=" + encodeURIComponent(token);
            } else {
              showAlert("error", data.error || "Login failed");
            }
          } catch (error) {
            showAlert("error", "Connection error. Please try again.");
            console.error("Error:", error);
          } finally {
            loader.style.display = "none";
            submitBtn.disabled = false;
            btnText.textContent = "Sign In";
          }
        });

      function showAlert(type, message) {
        const alertContainer = document.getElementById("alertContainer");
        const alertClass = type === "error" ? "alert-danger" : "alert-success";

        alertContainer.innerHTML = `
          <div class="alert ${alertClass} alert-dismissible fade show" role="alert">
            <i class="fas fa-${type === "error" ? "exclamation-circle" : "check-circle"}"></i>
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>`;
      }
    </script>
  </body>
</html>
