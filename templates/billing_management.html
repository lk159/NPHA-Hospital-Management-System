{% extends 'base.html' %}

{% block title %}Billing Management{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1">Billing Management</h1>
      <p class="text-muted mb-0">Track patient billing entries and payments.</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#billingModal" onclick="openBillingModal()">
      <i class="fas fa-plus"></i> New Billing Entry
    </button>
  </div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label">Search patient</label>
          <input id="billingPatientSearch" class="form-control" placeholder="Patient name or MRN">
        </div>
        <div class="col-md-3">
          <label class="form-label">Payment type</label>
          <select id="billingPaymentFilter" class="form-select">
            <option value="">All</option>
            <option value="cash">Cash</option>
            <option value="insurance">Insurance</option>
            <option value="credit">Credit</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Service</label>
          <input id="billingServiceFilter" class="form-control" placeholder="Service">
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" onclick="loadBilling()">Refresh</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Patient</th>
              <th>MRN</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Payment Type</th>
              <th>Billing Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="billingTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="billingModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="billingModalTitle">New Billing Entry</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="billingForm">
          <input type="hidden" id="billingId">
          <div class="mb-3">
            <label class="form-label">Patient</label>
            <select id="billingPatient" class="form-select" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Service</label>
            <input id="billingService" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" min="0" step="0.01" id="billingAmount" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Payment Type</label>
            <select id="billingPaymentType" class="form-select" required>
              <option value="cash">Cash</option>
              <option value="insurance">Insurance</option>
              <option value="credit">Credit</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Billing Date</label>
            <input type="datetime-local" id="billingDate" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea id="billingNotes" class="form-control" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveBilling()">Save Billing</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const apiBase = "/api";
  const token = localStorage.getItem("token");

  function requireAuth() {
    if (!token) {
      window.location.href = "/login/";
      return false;
    }
    return true;
  }

  function getHeaders() {
    return {
      Authorization: `Token ${token}`,
      "Content-Type": "application/json",
      "X-Requested-With": "XMLHttpRequest"
    };
  }

  function apiRequest(url, options = {}) {
    const opts = { headers: getHeaders(), ...options };
    return fetch(url, opts).then(async (response) => {
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.error || data.detail || "Request failed");
      }
      return data;
    });
  }

  function formatDateTime(value) {
    if (!value) return "—";
    return new Date(value).toLocaleString();
  }

  function toInputDateTime(value) {
    if (!value) return "";
    const date = new Date(value);
    return new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
  }

  async function loadPatients() {
    const data = await apiRequest(`${apiBase}/patients/?page_size=200`);
    const select = document.getElementById("billingPatient");
    select.innerHTML = '<option value="">Select patient</option>';
    (data.results || data).forEach((patient) => {
      const label = `${patient.first_name} ${patient.last_name} (${patient.mrn})`;
      select.insertAdjacentHTML("beforeend", `<option value="${patient.id}">${label}</option>`);
    });
  }

  async function loadBilling() {
    if (!requireAuth()) return;
    const params = new URLSearchParams();
    const search = document.getElementById("billingPatientSearch").value;
    const paymentType = document.getElementById("billingPaymentFilter").value;
    const service = document.getElementById("billingServiceFilter").value;
    if (search) params.append("search", search);
    if (paymentType) params.append("payment_type", paymentType);
    if (service) params.append("service", service);

    const data = await apiRequest(`${apiBase}/billing/?${params.toString()}`);
    const rows = document.getElementById("billingTableBody");
    rows.innerHTML = "";
    (data.results || data).forEach((entry) => {
      rows.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${entry.patient_name || "—"}</td>
          <td>${entry.patient || "—"}</td>
          <td>${entry.service || ""}</td>
          <td>${entry.amount || "0.00"}</td>
          <td>${entry.payment_type || ""}</td>
          <td>${formatDateTime(entry.billing_date)}</td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-2" onclick="editBilling(${entry.id})">Edit</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteBilling(${entry.id})">Delete</button>
          </td>
        </tr>`);
    });
  }

  async function openBillingModal() {
    document.getElementById("billingForm").reset();
    document.getElementById("billingId").value = "";
    document.getElementById("billingModalTitle").textContent = "New Billing Entry";
    await loadPatients();
  }

  async function editBilling(id) {
    const entry = await apiRequest(`${apiBase}/billing/${id}/`);
    document.getElementById("billingId").value = entry.id;
    document.getElementById("billingModalTitle").textContent = "Edit Billing Entry";
    document.getElementById("billingPatient").value = entry.patient;
    document.getElementById("billingService").value = entry.service || "";
    document.getElementById("billingAmount").value = entry.amount || "";
    document.getElementById("billingPaymentType").value = entry.payment_type || "cash";
    document.getElementById("billingDate").value = toInputDateTime(entry.billing_date);
    document.getElementById("billingNotes").value = entry.notes || "";
    await loadPatients();
    new bootstrap.Modal(document.getElementById("billingModal")).show();
  }

  async function saveBilling() {
    if (!requireAuth()) return;
    const id = document.getElementById("billingId").value;
    const payload = {
      patient: parseInt(document.getElementById("billingPatient").value),
      service: document.getElementById("billingService").value,
      amount: parseFloat(document.getElementById("billingAmount").value),
      payment_type: document.getElementById("billingPaymentType").value,
      billing_date: document.getElementById("billingDate").value,
      notes: document.getElementById("billingNotes").value
    };
    const method = id ? "PUT" : "POST";
    const url = id ? `${apiBase}/billing/${id}/` : `${apiBase}/billing/`;
    await apiRequest(url, { method, body: JSON.stringify(payload) });
    bootstrap.Modal.getInstance(document.getElementById("billingModal")).hide();
    await loadBilling();
  }

  async function deleteBilling(id) {
    if (!confirm("Delete this billing entry?")) return;
    await apiRequest(`${apiBase}/billing/${id}/`, { method: "DELETE" });
    await loadBilling();
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadBilling();
    loadPatients();
  });
</script>
{% endblock %}
